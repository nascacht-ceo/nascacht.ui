name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read        # checkout
      checks: write         # mikepenz/action-junit-report — create check runs
      pull-requests: write  # PR annotations from Playwright github reporter
      pages: write          # actions/deploy-pages
      id-token: write       # actions/deploy-pages OIDC token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── node_modules cache ─────────────────────────────────────────────────
      # Key on the lock file — cache hit skips npm ci entirely.
      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      # ── Playwright browser cache ───────────────────────────────────────────
      # Key on the lock file — refreshes only when @playwright/test is updated.
      # We always run `install --with-deps`: the binary is served from cache,
      # but OS-level system libs (libglib, libnss, etc.) still need apt-get.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium

      # ── Storybook build cache ──────────────────────────────────────────────
      # Key on every source file that affects the build.
      # A pure test-file change (*.e2e.ts) doesn't invalidate the cache because
      # those files are excluded from the hash pattern.
      - name: Cache Storybook build
        id: storybook-cache
        uses: actions/cache@v4
        with:
          path: storybook-static
          key: storybook-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'src/**/*.css', '.storybook/**') }}-${{ hashFiles('package-lock.json') }}

      - name: Build Storybook
        if: steps.storybook-cache.outputs.cache-hit != 'true'
        run: npm run build:storybook

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run E2E tests
        run: npm run test:e2e

      # ── Results ────────────────────────────────────────────────────────────
      # Renders pass/fail table directly in the workflow Summary tab.
      - name: Publish test summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: test-results/junit.xml
          check_name: Playwright results
          fail_on_failure: true

      # Full HTML report with traces — download and open with:
      #   npx playwright show-report playwright-report
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Deploy the HTML report to GitHub Pages so it's viewable in-browser
      # without downloading. URL: https://nascacht-ceo.github.io/nascacht.ui/
      # Requires: Settings → Pages → Source = "GitHub Actions" (already set)
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always() && github.ref == 'refs/heads/main'
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        if: always() && github.ref == 'refs/heads/main'
